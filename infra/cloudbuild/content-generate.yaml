# infra/cloudbuild/content-generate.yaml
# Cloud Build config: build and push the content generation pipeline image.
#
# This image runs generate_content.py by default. The same image can run
# embed_content.py or seed_db.py by overriding the entrypoint on
# `gcloud run jobs execute`.
#
# Trigger manually from repo root:
#   gcloud builds submit --config infra/cloudbuild/content-generate.yaml .
#
# Or wire to a Cloud Build trigger on push to main.

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --file
      - content-generation/Dockerfile
      - --tag
      - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-generate:$COMMIT_SHA
      - --tag
      - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-generate:latest
      - .
    waitFor: ["-"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-sha
    args:
      - push
      - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-generate:$COMMIT_SHA
    waitFor: [build]

  - name: "gcr.io/cloud-builders/docker"
    id: push-latest
    args:
      - push
      - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-generate:latest
    waitFor: [build]

images:
  - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-generate:$COMMIT_SHA
  - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-generate:latest

options:
  logging: CLOUD_LOGGING_ONLY
