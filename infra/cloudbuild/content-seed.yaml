# infra/cloudbuild/content-seed.yaml
# Cloud Build config: build and push the content seed image.
#
# This image runs seed_db.py (legacy seed-only, smaller footprint).
#
# Trigger manually from repo root:
#   gcloud builds submit --config infra/cloudbuild/content-seed.yaml .

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --file
      - content-generation/Dockerfile.seed
      - --tag
      - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-seed:latest
      - .
    waitFor: ["-"]

  - name: "gcr.io/cloud-builders/docker"
    id: push
    args:
      - push
      - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-seed:latest
    waitFor: [build]

images:
  - us-central1-docker.pkg.dev/agentic-learning-app-e13cb/agentic-learning/content-seed:latest

options:
  logging: CLOUD_LOGGING_ONLY
